# Ruff configuration — fast Python linter and formatter.
# Replaces flake8, pylint, isort, black, and more.
# See https://docs.astral.sh/ruff/

[tool.ruff]
# Target Python 3.12 (Checkmk 2.4 uses Python 3.12)
target-version = "py312"

# Line length matching black's default
line-length = 88

# Include all Python files
include = ["*.py", "*.pyi"]

# Exclude build artifacts and caches
exclude = [
    ".git",
    ".tox",
    ".nox",
    ".eggs",
    "*.egg-info",
    "__pycache__",
    ".pytest_cache",
    "build",
    "dist",
]

[tool.ruff.lint]
# Enable recommended rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EXE",    # flake8-executable
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint
    "TRY",    # tryceratops
    "FLY",    # flynt
    "PERF",   # Perflint
    "RUF",    # Ruff-specific rules
]

# Ignore rules that conflict with Checkmk conventions or are too strict
ignore = [
    "E501",    # Line too long (handled by formatter)
    "PLR0913", # Too many arguments
    "PLR2004", # Magic value comparison
    "TRY003",  # Long exception messages
    "ARG001",  # Unused function argument (common in check plugins)
    "ARG002",  # Unused method argument
    "PTH123",  # Use Path.open() — sometimes io.open is needed
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
# Tests can use assert, magic values, etc.
"tests/*" = ["S101", "PLR2004", "ARG001"]

[tool.ruff.lint.isort]
# Force single-line imports for clarity
force-single-line = false
# Known first-party modules
known-first-party = ["cmk", "cmk_addons"]

[tool.ruff.format]
# Use double quotes (Checkmk convention)
quote-style = "double"
# Indent with spaces
indent-style = "space"
# Respect magic trailing commas
skip-magic-trailing-comma = false
# Unix line endings
line-ending = "lf"

# =============================================================================
# Mypy — static type checker
# =============================================================================

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
extra_checks = true

# Ignore missing imports for Checkmk modules (not available outside CMK)
[[tool.mypy.overrides]]
module = [
    "cmk.*",
    "cmk_addons.*",
]
ignore_missing_imports = true

# =============================================================================
# Pytest configuration (moved from pytest.ini)
# =============================================================================

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = "-v --tb=short"
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (may require Checkmk)",
    "slow: Slow tests",
]
minversion = "7.0"

